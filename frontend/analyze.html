<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analyze Meal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/analyze.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="index.html" class="logo-container">

  <img
    src="assets/logo.png"
    alt="MacroDetect Logo"
    class="logo-image-header"
  />

</a>
      <nav class="nav-menu">
        <a href="index.html" class="nav-item">Home</a>
        <a href="about.html" class="nav-item">About</a>
        <a href="analyze.html" class="nav-item active">Analyze</a>
        <a href="contact.html" class="nav-item">Contact</a>
      </nav>
    </div>
  </header>

  <main class="main-content container">
    <h1 class="section-title" style="margin-top: 30px;">Analyze Your Meal</h1>
    <p class="section-description">
      Upload an image of your meal and see the macronutrient segmentation results.
    </p>

    
    <div class="analyze-layout">

  <div class="upload-card">

    <label for="imageInput" class="custom-upload">

      <div class="upload-icon">
        📸
      </div>

      <div class="upload-text">
        Click to select an image
      </div>

      <div class="upload-format">
        JPG, PNG supported
      </div>

      <input 
        type="file"
        id="imageInput"
        accept="image/*"
        hidden
      />

    </label>

    <div id="selectedFileName" class="selected-file">
      No image selected
    </div>

    <button id="analyzeBtn" class="analyze-btn" disabled>
      Analyze Meal
    </button>

    <div id="loadingText" class="loading-text" style="display:none;">
      Analyzing image with AI...
    </div>

  </div>


  <section id="resultsSection" class="results-section" style="display:none;">

    <h2 class="section-subtitle">Results</h2>

    <div class="analyze-results-wrapper">

      <div class="analyze-image-container">
        <h3 class="section-subtitle">Original Image</h3>
        <img id="originalImage" class="result-image" alt="Original meal" />
      </div>

      <div class="analyze-image-container">
        <h3 class="section-subtitle">Segmented Mask</h3>
        <img id="maskImage" class="result-image" alt="Segmented mask" />
      </div>

      <div id="barsContainer" class="analysis-bars"></div>

    </div>

  </section>

</div>
  </main>
</body>
</html>
